
services:
  - type: web_service
    name: appraisal-protest-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    serviceDetails:
      runtime: python
      plan: free
      region: oregon
      envSpecificDetails:
        buildCommand: pip install fastapi uvicorn fpdf2
        startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
      envVars:
        - key: DB_PATH
          value: /data/dcad2026.db
        - key: PYTHON_VERSION
          value: "3.12.0"

  - type: static_site
    name: appraisal-protest-ui
    region: oregon
    plan: free
    rootDir: frontend-vite
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://appraisal-protest-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
